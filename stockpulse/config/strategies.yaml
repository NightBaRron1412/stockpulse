filters:
  shariah_only: true
signals:
  rsi:
    period: 14
    oversold: 30
    overbought: 70
    weight: 0.07
    uptrend_zones:
      4050: 20
      5070: 0
      7075: -5
      7580: -10
      gt_80: -20
    downtrend_zones:
      lt_35: 0
      3555: 0
      5565: -5
      gt_65: -15
  macd:
    fast: 12
    slow: 26
    signal: 9
    weight: 0.07
  moving_averages:
    fast_ema: 20
    medium_sma: 50
    slow_sma: 200
    weight: 0.1
    price_vs_ma_weight: 0.6
    stack_slope_weight: 0.4
  volume:
    rvol_confirm: 1.5
    rvol_strong: 2.0
    lookback: 20
    weight: 0.14
    soft_positive_band:
    - 0.8
    - 1.0
    soft_positive_score: 5
    participation_confirm_rvol: 1.2
  breakout:
    periods:
    - 20
    - 55
    - 252
    require_volume: true
    rvol_min: 1.5
    weight: 0.15
  gap:
    threshold_pct: 0.5
    weight: 0.04
    normalize_by_atr: true
    use_excess_vs_sector: true
  adx:
    period: 14
    trend_threshold: 20
    weight: 0.06
  earnings:
    blackout_days: 3
    weight: 0.0
  sec_filing:
    lookback_days: 30
    insider_buy_weight: 3
    weight: 0.18
    raw_cap_without_direction: 25
    half_life_days:
      8k: 3
      10k_10q: 2
      form4_purchase: 10
    diminishing_returns: log1p
  news_sentiment:
    weight: 0.08
  relative_strength:
    benchmark: SPY
    periods:
    - 20
    - 60
    weight: 0.11
thresholds:
  buy: 55
  watchlist: 32
  watchlist_relaxed: 25
  caution: -30
  sell: -65
  exit: 15
  confidence_min: 55
confirmation:
  require_buckets: 2
  buckets:
    trend:
    - moving_averages
    - macd
    - adx
    - relative_strength
    participation:
    - volume
    - breakout
    catalyst:
    - sec_filing
risk:
  max_position_pct: 8
  max_sector_pct: 25
  risk_per_trade_pct: 0.75
  max_positions: 8
  drawdown_half: 8
  drawdown_pause: 12
  earnings_blackout_days: 3
scheduling:
  morning_scan: 09:35
  intraday_interval_minutes: 30
  eod_recap: '16:30'
  sec_scan_interval_hours: 2
  timezone: US/Eastern
backtesting:
  max_positions: 8
  position_size: volatility_adjusted
  initial_cash: 100000
allocation:
  full_position_only_on: BUY
  watchlist_starter_enabled: true
  watchlist_starter_min_score: 30
  watchlist_starter_requires:
  - trend_bucket_confirm
  - relative_strength_raw_gte_60
  - no_earnings_blackout
  - no_sector_or_cluster_cap_breach
  - price_above_20ema
  - not_invalidated
  watchlist_starter_size: 0.33
  watchlist_starter_risk: 0.25
  max_watchlist_sleeve: 0.25
  max_watchlist_names: 3
  max_one_name_per_cluster: true
  add_to_full_only_on_buy_upgrade: true
  never_average_down_watchlist: true
  watchlist_exit_score: 20
  watchlist_timeout_days: 5
portfolio_advisor:
  evaluate_after_every_scan: true
  push_only_on_state_change: true
  manual_execution: true
  cash_reserve_min: 0
  allow_watchlist_starters: true
  watchlist_starter_cash_only: true
  watchlist_starter_max_size_of_buy: 0.33
  suggest_trim_on_caution:
    enabled: true
    require_persistence_scans: 2
    trim_fraction: 0.25
  suggest_exit_on_sell: true
  suggest_swap_to_fund_buy:
    enabled: true
    incoming_min_score: 60
    incoming_tier: BUY
    outgoing_max_tier: HOLD
    min_score_gap: 20
    require_different_cluster: true
    require_persistence_scans: 2
    max_swaps_per_day: 1
  turnover:
    max_trims_per_week_per_position: 2
    min_hold_trading_days: 3
  never_swap_into_watchlist: true
  never_override_risk_caps: true
  taxable_account_show_tax_impact: true
  show_wash_sale_warning: true
