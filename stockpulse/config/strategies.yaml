signals:
  rsi:
    period: 14
    oversold: 30
    overbought: 70
    pullback_zone: [40, 50]  # in uptrends, RSI 40-50 = buyable pullback
    weight: 0.08
  macd:
    fast: 12
    slow: 26
    signal: 9
    weight: 0.11
  moving_averages:
    fast_ema: 20
    medium_sma: 50
    slow_sma: 200
    weight: 0.14
  volume:
    rvol_confirm: 1.5     # RVOL >= 1.5 = valid confirmation
    rvol_strong: 2.0      # RVOL >= 2.0 = strong catalyst
    lookback: 20
    weight: 0.17
  breakout:
    periods: [20, 55, 252]  # multi-timeframe breakouts
    require_volume: true
    rvol_min: 1.5
    weight: 0.20
  gap:
    threshold_pct: 0.5
    weight: 0.04
  adx:
    period: 14
    trend_threshold: 20
    weight: 0.06
  earnings:
    blackout_days: 3       # no new entries within 3 days of earnings
    weight: 0.00           # not a directional signal
  sec_filing:
    lookback_days: 30
    insider_buy_weight: 3  # insider buys scored 3x heavier than sells
    weight: 0.20
  news_sentiment:
    weight: 0.00           # keyword-based is noise per expert
  relative_strength:
    benchmark: "SPY"
    periods: [20, 50]      # compare over 20 and 50 day windows
    weight: 0.00           # will be enabled once implemented

thresholds:
  buy: 55
  watchlist: 35
  sell: -65
  exit: 15
  confidence_min: 55

confirmation:
  require_buckets: 2       # need 2 of 3 buckets confirming
  buckets:
    trend: [moving_averages, macd, adx]
    participation: [volume, breakout]
    catalyst: [sec_filing]

risk:
  max_position_pct: 8      # max 8% of portfolio per position
  max_sector_pct: 25       # max 25% in one sector
  risk_per_trade_pct: 0.75 # risk 0.75% of portfolio per trade
  max_positions: 8
  drawdown_half: 8         # at -8% drawdown, halve position sizes
  drawdown_pause: 12       # at -12% drawdown, pause new buys
  earnings_blackout_days: 3

scheduling:
  morning_scan: "09:00"
  intraday_interval_minutes: 30
  eod_recap: "16:30"
  sec_scan_interval_hours: 2
  timezone: "US/Eastern"

backtesting:
  max_positions: 8
  position_size: "volatility_adjusted"
  initial_cash: 100000
